services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      - convex-data:/convex/data
    environment:
      - CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3210
      - CONVEX_SITE_ORIGIN=http://127.0.0.1:3211
      - RUST_LOG=info
      - DOCUMENT_RETENTION_DELAY=172800
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: curl -f http://localhost:3210/version
      interval: 5s
      start_period: 10s

  generate-key:
    image: ghcr.io/get-convex/convex-backend:latest
    volumes:
      - convex-data:/convex/data
      - convex-init:/init
    depends_on:
      backend:
        condition: service_healthy
    entrypoint: ["sh", "-c", "./generate_admin_key.sh | grep '^convex-self-hosted' > /init/admin_key"]
    restart: "no"

  convex-push:
    image: ghcr.io/${GITHUB_REPO:-lawn}/convex-push:latest
    volumes:
      - convex-init:/init:ro
    depends_on:
      generate-key:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    restart: "no"

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://127.0.0.1:3210
    depends_on:
      backend:
        condition: service_healthy

  web:
    image: ghcr.io/${GITHUB_REPO:-lawn}/web:latest
    ports:
      - "5296:5296"
    depends_on:
      convex-push:
        condition: service_completed_successfully

  transcoder:
    image: ghcr.io/${GITHUB_REPO:-lawn}/transcoder:latest
    ports:
      - "3300:3300"
    environment:
      - CONVEX_URL=http://host.docker.internal:3211
      - TRANSCODER_SECRET=${TRANSCODER_WEBHOOK_SECRET:-lawn-transcode-secret}
      - S3_ENDPOINT=${RAILWAY_ENDPOINT:-http://host.docker.internal:9000}
      - S3_ACCESS_KEY_ID=${RAILWAY_ACCESS_KEY_ID:-minioadmin}
      - S3_SECRET_ACCESS_KEY=${RAILWAY_SECRET_ACCESS_KEY:-minioadmin}
      - S3_REGION=${RAILWAY_REGION:-us-east-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      convex-push:
        condition: service_completed_successfully

volumes:
  convex-data:
  convex-init:
