services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      - convex-data:/convex/data
    environment:
      - CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3210
      - CONVEX_SITE_ORIGIN=http://127.0.0.1:3211
      - RUST_LOG=info
      - DOCUMENT_RETENTION_DELAY=172800
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: curl -f http://localhost:3210/version
      interval: 5s
      start_period: 10s

  generate-key:
    image: ghcr.io/get-convex/convex-backend:latest
    volumes:
      - convex-data:/convex/data
      - convex-init:/init
    depends_on:
      backend:
        condition: service_healthy
    entrypoint: ["sh", "-c", "./generate_admin_key.sh | grep '^convex-self-hosted' > /init/admin_key"]
    restart: "no"

  convex-push:
    image: node:22-bookworm-slim
    environment:
      - CLERK_JWT_ISSUER_DOMAIN=${CLERK_JWT_ISSUER_DOMAIN:-disabled}
    volumes:
      - .:/app
      - push-node-modules:/app/node_modules
      - convex-init:/init:ro
    working_dir: /app
    depends_on:
      generate-key:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    entrypoint: ["sh", "/app/docker/convex-push.sh"]
    restart: "no"

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://127.0.0.1:3210
    depends_on:
      backend:
        condition: service_healthy

  web:
    image: node:22-bookworm-slim
    ports:
      - "5296:5296"
    volumes:
      - .:/app
      - push-node-modules:/app/node_modules
    working_dir: /app
    depends_on:
      convex-push:
        condition: service_completed_successfully
    command: ["npx", "vite", "dev", "--port", "5296", "--host", "0.0.0.0"]

  transcoder:
    build:
      context: ./docker/transcoder
      args:
        BASE: ${TRANSCODER_BASE:-cpu}
    ports:
      - "3300:3300"
    environment:
      - CONVEX_URL=http://host.docker.internal:3211
      - TRANSCODER_SECRET=${TRANSCODER_WEBHOOK_SECRET:-lawn-transcode-secret}
      - S3_ENDPOINT=${RAILWAY_ENDPOINT:-http://host.docker.internal:9000}
      - S3_ACCESS_KEY_ID=${RAILWAY_ACCESS_KEY_ID:-minioadmin}
      - S3_SECRET_ACCESS_KEY=${RAILWAY_SECRET_ACCESS_KEY:-minioadmin}
      - S3_REGION=${RAILWAY_REGION:-us-east-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      convex-push:
        condition: service_completed_successfully
    # For NVIDIA GPU, set TRANSCODER_BASE=nvidia in .env and uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu, video]

volumes:
  convex-data:
  convex-init:
  push-node-modules:
