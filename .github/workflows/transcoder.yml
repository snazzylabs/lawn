name: Build Transcoder

on:
  push:
    branches: [main]
    paths:
      - "docker/transcoder/**"
      - ".github/workflows/transcoder.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/transcoder

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - base: nvidia
            suffix: ""
          - base: cpu
            suffix: "-cpu"

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/transcoder
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: BASE=${{ matrix.base }}
          cache-from: type=gha,scope=${{ matrix.base }}
          cache-to: type=gha,mode=max,scope=${{ matrix.base }}
